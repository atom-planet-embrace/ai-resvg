name: Build

on: [push, pull_request]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # TODO: Enable this when more of the Linebender CI has been applied.
      #- name: install stable toolchain
      #  uses: dtolnay/rust-toolchain@master
      #  with:
      #    toolchain: ${{ env.RUST_STABLE_VER }}
      #    components: rustfmt

      - name: cargo fmt
        run: cargo fmt --all --check

      - name: install ripgrep
        run: |
          sudo apt update
          sudo apt install ripgrep

      - name: check copyright headers
        run: bash .github/copyright.sh

  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # We have to use the Release mode, otherwise it would take forever.
    - name: Test
      run: cargo test --all --features std,raster-images --release

    - name: Build C API
      working-directory: crates/c-api
      run: cargo build --features std,system-fonts,memmap-fonts

    - name: Build C API without default features
      working-directory: crates/c-api
      run: cargo build --no-default-features --features std

    - name: Build resvg without default support
      working-directory: crates/ai-resvg
      run: cargo check --no-default-features

    - name: Build usvg without default support
      working-directory: crates/ai-usvg
      run: cargo check --no-default-features

  no-std:
    name: no_std Build
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - name: Install thumbv7m target
      run: rustup target add thumbv7m-none-eabi

    - name: Build usvg (no_std)
      working-directory: crates/ai-usvg
      run: cargo build --target thumbv7m-none-eabi --no-default-features

    - name: Build resvg (no_std)
      working-directory: crates/ai-resvg
      run: cargo build --target thumbv7m-none-eabi --no-default-features

  msrv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.87.0

      - name: Build
        run: cargo build --features std

  # We have some Windows specific code that we should check on each commit.
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      # Toolchain is stable-x86_64-pc-windows-msvc by default. No need to change it.

      - name: Build thumbnailer
        working-directory: tools/explorer-thumbnailer
        env:
          RUSTFLAGS: -Ctarget-feature=+crt-static # make sure it's static
        run: cargo build

      # Unlike other binaries, viewsvg isn't built with crt-static
      - name: Build C API
        working-directory: crates/c-api
        run: cargo build --release --features std

  # If this fails, consider changing your text or adding something to .typos.toml.
  typos:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: check typos
        uses: crate-ci/typos@v1.28.4
